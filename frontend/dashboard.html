<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustLens - Analytics Dashboard</title>
    <meta name="description" content="Dashboard for Fake Review Analytics.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html">TrustLens</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Detector</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5 fade-in">
        <div class="mb-5 border-bottom border-secondary pb-3">
            <h1 class="fw-bold">Analytics <span style="color: var(--primary-hover);">Overview</span></h1>
            <p class="text-muted fs-5">System-wide review processing statistics.</p>
        </div>

        <!-- Top Stats Row -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="glass-card stat-card h-100">
                    <h5 class="text-muted text-uppercase tracking-wide">Total Reviews Analyzed</h5>
                    <div class="stat-value" id="totalReviews">0</div>
                    <small class="text-muted">Since system inception</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card stat-card h-100">
                    <h5 class="text-muted text-uppercase tracking-wide">Genuine Reviews</h5>
                    <div class="stat-value text-genuine" id="genuineCount">0</div>
                    <small class="text-muted">Authentic user feedback</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card stat-card h-100">
                    <h5 class="text-muted text-uppercase tracking-wide">Fake Reviews</h5>
                    <div class="stat-value text-fake" id="fakeCount">0</div>
                    <small class="text-muted">Detected as AI/Spam</small>
                </div>
            </div>
        </div>

        <!-- Distribution Bars -->
        <div class="row">
            <div class="col-12">
                <div class="glass-card">
                    <h4 class="mb-4">Review Authenticity Distribution</h4>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-genuine fw-bold">Genuine</span>
                            <span id="genuineLabel" class="text-genuine fw-bold">0%</span>
                        </div>
                        <div class="progress">
                            <div id="genuineProgress" class="progress-bar progress-bar-genuine progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-fake fw-bold">Fake</span>
                            <span id="fakeLabel" class="text-fake fw-bold">0%</span>
                        </div>
                        <div class="progress">
                            <div id="fakeProgress" class="progress-bar progress-bar-fake progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
